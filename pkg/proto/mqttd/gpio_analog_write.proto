syntax = "proto3";

package ai.metathings.service.mqttd;

import "github.com/mwitkow/go-proto-validators/validator.proto";

import "model.proto";

message GpioAnalogWriteRequest {
	OpGpioValue gpio = 1 [(validator.field) = {msg_exists: true}];
}

message GpioAnalogWriteResponse {
    GpioValue gpio = 1;
}
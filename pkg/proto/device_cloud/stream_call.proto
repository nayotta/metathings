syntax = "proto3";

package ai.metathings.service.device_cloud;

import "google/protobuf/wrappers.proto";
import "google/protobuf/any.proto";
import "github.com/mwitkow/go-proto-validators/validator.proto";

message StreamCallRequest {
	google.protobuf.StringValue device_id = 1 [(validator.field) = {msg_exists: true}];
	google.protobuf.Any payload = 2 [(validator.field) = {msg_exists: true}];
}

message StreamCallResponse {
	google.protobuf.Any payload = 1;
}
